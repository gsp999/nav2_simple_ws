# 蓝方 (Blue Team) 导航路径点
# 单位: 米 (meters)，原始数据以 mm 为单位，此处已转换为 m
# 坐标系: map 坐标系，参见 CLAUDE.md 世界坐标系说明
#   - X: -0.4 ~ 11.6 (武馆 → 擂台)
#   - Y: -4.6 ~ +4.6 (红负蓝正, Y=0 中线)
#   - 蓝方 origin: [-0.4, -1.4, 0]

team: blue
units: meters

waypoints:
  # ── 矛头对准位置 (6个) ──
  # 原始 mm: (50,-1200), (250,-1200), (450,-1200), (650,-1200), (850,-1200), (1050,-1200)
  # y 位置可能需要调整，目前留了 75mm 余量
  spear_alignment:
    description: "矛头对准位置 — 武馆区，Y=-1.2m 线"
    yaw: -1.5708  # 顺时针90° (朝 Y 负，面向场地内侧)
    points:
      - {x: 0.05, y: -1.20}
      - {x: 0.25, y: -1.20}
      - {x: 0.45, y: -1.20}
      - {x: 0.65, y: -1.20}
      - {x: 0.85, y: -1.20}
      - {x: 1.05, y: -1.20}

  # ── 梅林区中心点 (12个, 3列×4行) ──
  # 原始 mm: X列=3400,4600,5800,7000; Y行=400,1600,2800
  merlin_centers:
    description: "梅林区中心点 — X∈[3.4,7.0], Y∈[0.4,2.8]"
    yaw: 0.0
    points:
      # 第1列 X=3.4
      - {x: 3.40, y: 0.40}
      - {x: 3.40, y: 1.60}
      - {x: 3.40, y: 2.80}
      # 第2列 X=4.6
      - {x: 4.60, y: 0.40}
      - {x: 4.60, y: 1.60}
      - {x: 4.60, y: 2.80}
      # 第3列 X=5.8
      - {x: 5.80, y: 0.40}
      - {x: 5.80, y: 1.60}
      - {x: 5.80, y: 2.80}
      # 第4列 X=7.0
      - {x: 7.00, y: 0.40}
      - {x: 7.00, y: 1.60}
      - {x: 7.00, y: 2.80}

  # ── 上坡前准备点 ──
  # 距离斜坡 0.25m，调整姿态对准坡道
  pre_ramp:
    description: "上坡前准备点 — 距斜坡(X=8.9)前 0.25m，对准坡道正面"
    yaw: 0.0  # 正对上坡方向，ramp_zone_manager 进坡后自动锁 yaw=0
    points:
      - {x: 8.65, y: 3.85}

  # ── 竞技区放 KFS 位置 (左中右) ──
  # 原始 mm: (10840,-1200), (10300,-1200), (9760,-1200)
  competition_kfs:
    description: "竞技区放 KFS 位置 — 坡后擂台区，Y=-1.2m 线"
    yaw: -1.5708  # 顺时针90° (朝 Y 负，面向场地内侧)
    points:
      - {x: 10.84, y: -1.20}  # 左
      - {x: 10.30, y: -1.20}  # 中
      - {x: 9.76, y: -1.20}   # 右
